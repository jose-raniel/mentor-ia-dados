<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mentor IA de Dados - Aprenda SQL, Python, DAX, Power BI com mentor experiente de 15 anos">
    <meta name="theme-color" content="#3b82f6">
    <title>Mentor IA - Senior em Dados & BI | SQL • Python • DAX • Power BI</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f9fafb; }
        html, body, #root { height: 100%; width: 100%; }
        
        .mentor-badge { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .message-mentor { background: #eff6ff; border-left: 4px solid #3b82f6; border-radius: 8px; }
        .message-user { background: #f0fdf4; border-left: 4px solid #16a34a; border-radius: 8px; }
        .challenge-card { border: 2px solid #e5e7eb; border-radius: 12px; transition: all 0.3s ease; }
        .challenge-card:hover { border-color: #3b82f6; background: #f0f9ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
        
        .code-editor { font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px; }
        .sidebar { background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%); border-right: 1px solid #e5e7eb; }
        .tab-btn { transition: all 0.3s ease; position: relative; }
        .tab-btn.active { color: #3b82f6; font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #3b82f6; border-radius: 2px; }
        
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(-8px); opacity: 1; } }
        
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-title { font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 24px; }
        
        .project-status-badge { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; }
        .status-ready { background: #dcfce7; color: #166534; }
        .status-progress { background: #fef3c7; color: #92400e; }
        .status-planning { background: #fee2e2; color: #991b1b; }
        
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .feature-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; text-align: center; transition: all 0.3s ease; }
        .feature-card:hover { border-color: #3b82f6; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1); }
        .feature-icon { font-size: 40px; margin-bottom: 12px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .flex-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useRef, useEffect } = React;

        // Sistema de Desafios
        const DESAFIOS = [
            {
                id: 1,
                titulo: "SQL Básico - Agregações",
                nivel: "🟢 Iniciante",
                descricao: "Escreva uma query que retorne total de vendas por categoria",
                instrucoes: "Crie uma query SQL que:\n1. Agrupe vendas por categoria\n2. Retorne total e quantidade de registros\n3. Ordene por total descendente",
                exemploEsperado: "SELECT categoria, SUM(valor) as total, COUNT(*) as qtd FROM vendas GROUP BY categoria ORDER BY total DESC",
                topico: "SQL"
            },
            {
                id: 2,
                titulo: "DAX - Medidas de Performance",
                nivel: "🟡 Intermediário",
                descricao: "Crie uma medida que calcula margem de lucro com contexto",
                instrucoes: "Escreva uma medida DAX que:\n1. Calcule Lucro = Receita - Custo\n2. Calcule Margem % = Lucro / Receita\n3. Use CALCULATE para filtros dinâmicos\n4. Formate como percentual",
                exemploEsperado: "Lucro = [Receita] - [Custo]\nMargem % = DIVIDE([Lucro], [Receita], 0)",
                topico: "DAX"
            },
            {
                id: 3,
                titulo: "Python - ETL com Pandas",
                nivel: "🟡 Intermediário",
                descricao: "Construa um pipeline de limpeza de dados",
                instrucoes: "Crie um script Python que:\n1. Leia CSV com dados sujos\n2. Remova valores faltantes\n3. Converta tipos de dados\n4. Aplique transformações\n5. Salve resultado limpo",
                exemploEsperado: "import pandas as pd\ndf = pd.read_csv('dados.csv')\ndf = df.dropna()\ndf.to_csv('limpo.csv', index=False)",
                topico: "Python"
            },
            {
                id: 4,
                titulo: "Power BI - Dashboard KPI",
                nivel: "🔴 Avançado",
                descricao: "Projete um dashboard executivo de vendas",
                instrucoes: "Desenhe um dashboard que:\n1. Mostre KPIs: Receita, Crescimento YoY, % Meta\n2. Gráfico de vendas por região\n3. Top 5 produtos com margem\n4. Slicers: Data e Região\n5. Storytelling claro",
                exemploEsperado: "- Cards: Receita Total | +15% YoY | 95% Meta\n- Gráfico: Vendas por Região\n- Tabela: Top 5 Produtos\n- Slicers interativos",
                topico: "Power BI"
            },
            {
                id: 5,
                titulo: "SQL Avançado - Window Functions",
                nivel: "🔴 Avançado",
                descricao: "Use window functions para análise temporal",
                instrucoes: "Crie uma query que:\n1. Calcule running total de vendas\n2. Rank de produtos por período\n3. Diferença vs período anterior (LAG)\n4. Performance: otimize para 1M+ registros",
                exemploEsperado: "SELECT data, produto, vendas,\n  SUM(vendas) OVER (ORDER BY data) as running_total,\n  LAG(vendas) OVER (PARTITION BY produto ORDER BY data) as prev_periodo",
                topico: "SQL"
            }
        ];

        // Projetos de Portfólio
        const PROJETOS = [
            {
                id: 1,
                titulo: 'ETL End-to-End com Python + SQL',
                descricao: 'Pipeline profissional: extração de API → transformação Pandas → carga em banco',
                status: 'ready',
                techs: ['Python', 'SQL', 'Pandas', 'PostgreSQL'],
                duracao: '2 semanas',
                complexidade: 'Intermediário'
            },
            {
                id: 2,
                titulo: 'Dashboard Executivo em Power BI',
                descricao: 'Dashboard com KPIs, storytelling e interatividade profissional',
                status: 'progress',
                techs: ['Power BI', 'DAX', 'SQL', 'RLS'],
                duracao: '1 semana',
                complexidade: 'Intermediário'
            },
            {
                id: 3,
                titulo: 'Arquitetura Medallion com Fabric',
                descricao: 'Bronze → Silver → Gold: Data Lake estruturado e otimizado',
                status: 'planning',
                techs: ['Microsoft Fabric', 'SQL', 'Python', 'Dataflow'],
                duracao: '3 semanas',
                complexidade: 'Avançado'
            },
            {
                id: 4,
                titulo: 'Automação com Python + APIs',
                descricao: 'Bot que coleta dados de APIs e alimenta seu banco automaticamente',
                status: 'ready',
                techs: ['Python', 'APIs REST', 'Scheduling', 'Error Handling'],
                duracao: '1 semana',
                complexidade: 'Intermediário'
            }
        ];

        function MentorApp() {
            const [activeTab, setActiveTab] = useState('home');
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    tipo: 'mentor',
                    texto: '👋 **Bem-vindo!** Sou seu mentor com 15 anos em dados.\n\n📚 Aqui você encontra:\n• **Mentoria** - Tire dúvidas sobre SQL, Python, DAX, Power BI\n• **Code Review** - Envie seu código e receba feedback\n• **Desafios** - Pratique com problemas reais (5 níveis)\n• **Projetos** - Construa seu portfólio profissional\n\n🚀 Vamos começar? Pergunte algo sobre dados!',
                    timestamp: new Date()
                }
            ]);
            const [inputChat, setInputChat] = useState('');
            const [code, setCode] = useState('SELECT * FROM vendas LIMIT 10;');
            const [codeLanguage, setCodeLanguage] = useState('sql');
            const [selectedDesafio, setSelectedDesafio] = useState(null);
            const [desafioCode, setDesafioCode] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const enviarMensagem = async () => {
                if (!inputChat.trim()) return;

                const novaMsg = {
                    id: messages.length + 1,
                    tipo: 'usuario',
                    texto: inputChat,
                    timestamp: new Date()
                };

                setMessages([...messages, novaMsg]);
                setInputChat('');
                setLoading(true);

                setTimeout(() => {
                    const respostas = [
                        '🎯 **Excelente pergunta!**\n\n**Contexto**: Essa é uma questão fundamental em engenharia de dados...\n\n**Solução**:\n- Abordagem 1: Use CTEs para clareza\n- Abordagem 2: Window functions para performance\n\n**Boas Práticas**:\n✅ Sempre index suas colunas de filtro\n✅ Teste performance com dados reais\n✅ Documente suas queries complexas\n\n**Próximo Passo**: Quer que eu revise seu código?',
                        
                        '💡 **Ótima questão!** Deixa eu explicar...\n\n**O Conceito**:\nIsso funciona porque... [explicação técnica]\n\n**Exemplo Prático**:\n```sql\nSELECT coluna FROM tabela WHERE condicao\n```\n\n**Armadilhas Comuns**:\n⚠️ Evite fazer X quando Y é mais eficiente\n⚠️ Cuidado com NULL values\n\n**Você já experimentou com [variação]?**',
                        
                        '🚀 **Ótimo insight!**\n\n**Análise**:\nSua abordagem tem mérito porque...\n\nAlternativas:\n1️⃣ Caminho A - mais rápido\n2️⃣ Caminho B - mais legível  \n3️⃣ Caminho C - mais escalável\n\n**Recomendação**: Para seu caso, use [opção] porque:\n• Performance: ⚡⚡⚡\n• Manutenibilidade: ⚡⚡⚡⚡\n• Escalabilidade: ⚡⚡⚡⚡⚡\n\n**Vamos testar juntos?**'
                    ];

                    const resposta = {
                        id: messages.length + 2,
                        tipo: 'mentor',
                        texto: respostas[Math.floor(Math.random() * respostas.length)],
                        timestamp: new Date()
                    };

                    setMessages(prev => [...prev, resposta]);
                    setLoading(false);
                }, 1500);
            };

            const enviarCodeReview = async () => {
                if (!code.trim()) return;

                setLoading(true);
                setTimeout(() => {
                    const review = {
                        id: messages.length + 1,
                        tipo: 'mentor',
                        texto: `📋 **Code Review - ${codeLanguage.toUpperCase()}**\n\n**Avaliação**: ⭐⭐⭐⭐ Código bem estruturado!\n\n**Feedback Construtivo**:\n✅ Lógica correta e clara\n⚠️ Considere adicionar índices em colunas grandes\n💡 Sugestão: Use CTEs para melhorar legibilidade\n🔧 Otimização: Isso pode rodar 30% mais rápido com [técnica]\n\n**Boas Práticas Aplicadas**:\n✓ Nomes de colunas explícitos\n✓ Aliases bem nomeados\n✓ Indentação clara\n\n**Sugestão de Melhoria**:\n\`\`\`${codeLanguage}\n-- Versão otimizada\nSEU_CÓDIGO_MELHORADO_AQUI\n\`\`\`\n\n**Próximo Passo**: Quer explorar [tópico avançado]?`,
                        timestamp: new Date()
                    };

                    setMessages(prev => [...prev, review]);
                    setLoading(false);
                }, 1500);
            };

            const submeterDesafio = () => {
                if (!desafioCode.trim() || !selectedDesafio) return;

                setLoading(true);
                setTimeout(() => {
                    const feedback = {
                        id: messages.length + 1,
                        tipo: 'mentor',
                        texto: `🎯 **Desafio Completo: ${selectedDesafio.titulo}**\n\n**Sua Solução**:\n\`\`\`${selectedDesafio.topico.toLowerCase()}\n${desafioCode}\n\`\`\`\n\n**Avaliação**:\n✅ Lógica correta!\n✅ Abordagem eficiente\n💡 Você poderia também tentar com [técnica alternativa]\n\n**Conceitos Aprendidos**:\n• Dominou ${selectedDesafio.topico}\n• Pronto para nível seguinte\n• Padrão aplicável em [cenários reais]\n\n**🏆 Parabéns!** Você evoluiu! Próximo desafio?`,
                        timestamp: new Date()
                    };

                    setMessages(prev => [...prev, feedback]);
                    setLoading(false);
                    setDesafioCode('');
                    setSelectedDesafio(null);
                }, 1500);
            };

            // Home Tab
            if (activeTab === 'home') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50">
                        <div className="max-w-7xl mx-auto px-6 py-12">
                            {/* Header */}
                            <div className="text-center mb-16">
                                <div className="inline-block mb-4">
                                    <span className="mentor-badge">✨ Mentor Experiente</span>
                                </div>
                                <h1 className="text-5xl font-bold text-gray-900 mb-4">
                                    Evoluir em Dados é <span className="gradient-text">Ciência</span>
                                </h1>
                                <p className="text-xl text-gray-600 mb-8">
                                    Mentor com 15 anos de experiência em SQL, Python, DAX e Power BI<br/>
                                    Aprenda com projetos reais e feedback profissional
                                </p>
                                <button
                                    onClick={() => setActiveTab('chat')}
                                    className="px-8 py-4 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition shadow-lg"
                                >
                                    🚀 Comece Agora
                                </button>
                            </div>

                            {/* Features */}
                            <div className="feature-grid">
                                <div className="feature-card">
                                    <div className="feature-icon">💬</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Mentoria em Tempo Real</h3>
                                    <p className="text-sm text-gray-600">Chat com mentor experiente. Tire dúvidas sobre qualquer conceito.</p>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">🔍</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Code Review</h3>
                                    <p className="text-sm text-gray-600">Envie SQL, Python, DAX. Receba feedback profissional detalhado.</p>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">🎯</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Desafios Práticos</h3>
                                    <p className="text-sm text-gray-600">5 desafios progressivos. Do iniciante ao avançado.</p>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">📊</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Projetos de Portfólio</h3>
                                    <p className="text-sm text-gray-600">Construa projetos reais para sua carreira profissional.</p>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">🏆</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Boas Práticas</h3>
                                    <p className="text-sm text-gray-600">Aprenda padrões profissionais usados por grandes empresas.</p>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">📈</div>
                                    <h3 className="font-semibold text-gray-900 mb-2">Roadmap Profissional</h3>
                                    <p className="text-sm text-gray-600">Caminho claro para evoluir na carreira de dados.</p>
                                </div>
                            </div>

                            {/* Tecnologias */}
                            <div className="bg-white rounded-xl p-12 shadow-lg mb-12">
                                <h2 className="section-title text-center">Tecnologias Cobertas</h2>
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-8 text-center">
                                    {['SQL', 'Python', 'Power BI', 'DAX', 'Fabric'].map((tech, i) => (
                                        <div key={i} className="p-6 bg-blue-50 rounded-lg">
                                            <p className="font-semibold text-gray-900">{tech}</p>
                                            <p className="text-sm text-gray-600 mt-2">Domínio Completo</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* CTA */}
                            <div className="text-center">
                                <p className="text-gray-600 mb-6">Pronto para transformar sua carreira em dados?</p>
                                <button
                                    onClick={() => setActiveTab('chat')}
                                    className="px-10 py-4 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition shadow-lg text-lg"
                                >
                                    Acessar Mentoria →
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Main Layout
            return (
                <div className="flex h-screen bg-gray-50">
                    {/* Sidebar */}
                    <div className="w-64 sidebar hidden md:flex flex-col shadow-lg">
                        <div className="p-6 border-b border-gray-200">
                            <h1 className="text-2xl font-bold gradient-text">Mentor IA</h1>
                            <p className="text-xs text-gray-600 mt-1">Senior em Dados</p>
                        </div>

                        <nav className="flex-1 p-4 space-y-2">
                            {[
                                { id: 'home', icon: '🏠', label: 'Início' },
                                { id: 'chat', icon: '💬', label: 'Mentoria' },
                                { id: 'review', icon: '🔍', label: 'Code Review' },
                                { id: 'desafios', icon: '🎯', label: 'Desafios' },
                                { id: 'projetos', icon: '📊', label: 'Projetos' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`tab-btn w-full text-left px-4 py-3 rounded-lg transition ${
                                        activeTab === tab.id
                                            ? 'bg-blue-50 text-blue-600 font-semibold'
                                            : 'text-gray-700 hover:bg-gray-50'
                                    }`}
                                >
                                    {tab.icon} {tab.label}
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-gray-200">
                            <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-4 rounded-lg border border-blue-200">
                                <p className="text-sm font-semibold text-blue-900 mb-2">💡 Dica do Dia</p>
                                <p className="text-xs text-blue-800 leading-relaxed">1 hora por dia consistente > 10 horas esporádicas. Foco em projetos reais!</p>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Chat Tab */}
                        {activeTab === 'chat' && (
                            <>
                                <div className="bg-white border-b border-gray-200 p-4 shadow-sm">
                                    <h2 className="text-xl font-semibold text-gray-900">💬 Mentoria em Tempo Real</h2>
                                    <p className="text-sm text-gray-600">Pergunte qualquer coisa sobre SQL, Python, DAX, Power BI...</p>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                    {messages.map(msg => (
                                        <div key={msg.id} className={`flex ${msg.tipo === 'mentor' ? 'justify-start' : 'justify-end'}`}>
                                            <div className={`max-w-lg p-4 rounded-lg message-${msg.tipo}`}>
                                                <p className="text-sm whitespace-pre-wrap">{msg.texto}</p>
                                                <p className="text-xs text-gray-500 mt-2">{msg.timestamp.toLocaleTimeString('pt-BR')}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {loading && (
                                        <div className="flex justify-start">
                                            <div className="message-mentor p-4 rounded-lg">
                                                <div className="loading-dots">
                                                    <span></span><span></span><span></span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>

                                <div className="border-t border-gray-200 p-4 bg-white">
                                    <div className="flex gap-2">
                                        <input
                                            type="text"
                                            value={inputChat}
                                            onChange={(e) => setInputChat(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && enviarMensagem()}
                                            placeholder="Pergunte sobre SQL, Python, DAX, Power BI..."
                                            className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button
                                            onClick={enviarMensagem}
                                            className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold"
                                        >
                                            Enviar
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}

                        {/* Code Review Tab */}
                        {activeTab === 'review' && (
                            <div className="flex-1 flex flex-col">
                                <div className="bg-white border-b border-gray-200 p-4 shadow-sm flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-semibold text-gray-900">🔍 Code Review</h2>
                                        <p className="text-sm text-gray-600">Envie seu código e receba feedback profissional</p>
                                    </div>
                                    <select
                                        value={codeLanguage}
                                        onChange={(e) => setCodeLanguage(e.target.value)}
                                        className="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold"
                                    >
                                        <option value="sql">SQL</option>
                                        <option value="python">Python</option>
                                        <option value="dax">DAX</option>
                                    </select>
                                </div>

                                <div className="flex-1 flex flex-col overflow-hidden p-4">
                                    <textarea
                                        value={code}
                                        onChange={(e) => setCode(e.target.value)}
                                        className="flex-1 p-4 font-mono text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 mb-4"
                                        placeholder="Cole seu código aqui..."
                                    />

                                    <div className="flex-1 overflow-y-auto space-y-4 mb-4 border-t pt-4">
                                        {messages.filter(m => m.tipo === 'mentor' && m.texto.includes('Review')).slice(-3).map(msg => (
                                            <div key={msg.id} className="message-mentor p-4 rounded-lg">
                                                <p className="text-sm whitespace-pre-wrap">{msg.texto}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={enviarCodeReview}
                                        className="w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-semibold"
                                    >
                                        🔍 Revisar Código
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Desafios Tab */}
                        {activeTab === 'desafios' && (
                            <div className="flex-1 overflow-y-auto p-6">
                                {!selectedDesafio ? (
                                    <div>
                                        <h2 className="section-title">🎯 Desafios Práticos</h2>
                                        <div className="space-y-4">
                                            {DESAFIOS.map(desafio => (
                                                <div
                                                    key={desafio.id}
                                                    onClick={() => setSelectedDesafio(desafio)}
                                                    className="challenge-card p-6 cursor-pointer"
                                                >
                                                    <div className="flex justify-between items-start mb-3">
                                                        <h3 className="text-lg font-semibold text-gray-900">{desafio.titulo}</h3>
                                                        <span className="text-sm font-semibold px-3 py-1 bg-blue-100 text-blue-700 rounded-full">
                                                            {desafio.topico}
                                                        </span>
                                                    </div>
                                                    <p className="text-gray-700 mb-3">{desafio.descricao}</p>
                                                    <p className="text-sm text-gray-600">{desafio.nivel}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <button
                                            onClick={() => {
                                                setSelectedDesafio(null);
                                                setDesafioCode('');
                                            }}
                                            className="text-blue-600 hover:text-blue-800 font-semibold"
                                        >
                                            ← Voltar aos Desafios
                                        </button>

                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
                                            <h2 className="text-2xl font-bold text-gray-900 mb-2">{selectedDesafio.titulo}</h2>
                                            <p className="text-gray-700 mb-4">{selectedDesafio.descricao}</p>
                                            <div className="bg-white p-4 rounded border border-blue-200">
                                                <p className="font-semibold text-gray-900 mb-3">📋 Instruções:</p>
                                                <p className="text-sm text-gray-700 whitespace-pre-wrap">{selectedDesafio.instrucoes}</p>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-semibold text-gray-900 mb-2">Sua Solução em {selectedDesafio.topico}:</label>
                                            <textarea
                                                value={desafioCode}
                                                onChange={(e) => setDesafioCode(e.target.value)}
                                                className="w-full h-48 p-4 font-mono text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"
                                                placeholder={`Escreva sua solução em ${selectedDesafio.topico}...`}
                                            />
                                        </div>

                                        <button
                                            onClick={submeterDesafio}
                                            className="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold"
                                        >
                                            🚀 Submeter Desafio
                                        </button>

                                        {messages.filter(m => m.texto.includes('Desafio')).map(msg => (
                                            <div key={msg.id} className="message-mentor p-4 rounded-lg">
                                                <p className="text-sm whitespace-pre-wrap">{msg.texto}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Projetos Tab */}
                        {activeTab === 'projetos' && (
                            <div className="p-6 overflow-y-auto">
                                <h2 className="section-title">📊 Projetos de Portfólio</h2>
                                <div className="space-y-4">
                                    {PROJETOS.map(proj => (
                                        <div key={proj.id} className="border border-gray-200 rounded-lg p-6 hover:shadow-lg transition">
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <h3 className="text-lg font-semibold text-gray-900">{proj.titulo}</h3>
                                                    <p className="text-gray-700 mt-1">{proj.descricao}</p>
                                                </div>
                                                <span className={`project-status-badge status-${proj.status}`}>
                                                    {proj.status === 'ready' && '✅ Pronto'}
                                                    {proj.status === 'progress' && '⏳ Em Progresso'}
                                                    {proj.status === 'planning' && '📋 Planejamento'}
                                                </span>
                                            </div>
                                            <div className="flex gap-4 text-sm text-gray-600 mb-3">
                                                <span>⏱️ {proj.duracao}</span>
                                                <span>📈 {proj.complexidade}</span>
                                            </div>
                                            <div className="flex gap-2 flex-wrap">
                                                {proj.techs.map((tech, i) => (
                                                    <span key={i} className="text-xs px-3 py-1 bg-gray-100 text-gray-700 rounded-full">
                                                        {tech}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<MentorApp />, document.getElementById('root'));
    </script>
</body>
</html>
